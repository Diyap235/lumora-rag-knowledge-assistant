<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- same geometry, currentColor so it adapts to any context -->
  <rect x="6" y="6" width="5" height="20" rx="1.5" fill="currentColor"/>
  <rect x="6" y="21" width="14" height="5" rx="1.5" fill="currentColor"/>

  <line x1="11" y1="5" x2="19" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="19" y1="9" x2="25" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="11" y1="5" x2="25" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>

  <circle cx="11" cy="5" r="2" fill="currentColor"/>
  <circle cx="19" cy="9" r="2" fill="currentColor"/>
  <circle cx="25" cy="4" r="2" fill="currentColor"/>
</svg>
