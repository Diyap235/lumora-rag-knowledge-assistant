<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- L base shape -->
  <rect x="6" y="6" width="5" height="20" rx="1.5" fill="#22C55E"/>
  <rect x="6" y="21" width="14" height="5" rx="1.5" fill="#22C55E"/>

  <!-- knowledge nodes — triangle constellation above L -->
  <!-- edges between nodes -->
  <line x1="11" y1="5" x2="19" y2="9" stroke="#22C55E" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="19" y1="9" x2="25" y2="4" stroke="#22C55E" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="11" y1="5" x2="25" y2="4" stroke="#22C55E" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- edge from L top to center node -->
  <line x1="11" y1="6" x2="11" y2="5" stroke="#22C55E" stroke-width="1.5" stroke-linecap="round"/>

  <!-- node dots -->
  <circle cx="11" cy="5" r="2" fill="#22C55E"/>
  <circle cx="19" cy="9" r="2" fill="#22C55E"/>
  <circle cx="25" cy="4" r="2" fill="#22C55E"/>
</svg>
